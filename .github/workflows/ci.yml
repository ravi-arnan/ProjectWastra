name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Types · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Unit tests (coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          # Build never embeds real secrets; placeholders keep import.meta.env defined.
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy-anon-key

  a11y:
    name: Accessibility audit (axe-core)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Playwright
        run: npx playwright install --with-deps chrome

      - name: Run axe-core audit (boots the dev stack, 9 routes)
        run: npm run test:a11y
        env:
          # The audit seeds a synthetic Supabase session in localStorage; no real
          # project is contacted, so dummy values are sufficient and safe.
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy-anon-key

      - name: Upload failure artifacts (traces + screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
